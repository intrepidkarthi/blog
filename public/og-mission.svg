<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#030604"/>
    <stop offset="1" stop-color="#0d1810"/>
  </linearGradient>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="1" fill="rgba(78,255,124,0.07)"/>
  </pattern>
  <filter id="glow"><feGaussianBlur stdDeviation="2.5"/></filter>
</defs>

<rect width="1200" height="630" fill="url(#bg)"/>
<rect width="1200" height="630" fill="url(#grid)"/>

<g opacity="0.18">
  <rect x="0" y="0" width="1200" height="2" fill="#000"/>
  <rect x="0" y="6" width="1200" height="2" fill="#000"/>
  <rect x="0" y="12" width="1200" height="2" fill="#000"/>
</g>

<!-- terminal prompt -->
<text x="80" y="100" fill="#5f7a65" font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="3">
  KARTHIKEYAN NG:~/mission$ cat goals.md
</text>

<line x1="80" y1="135" x2="1120" y2="135" stroke="#16291c" stroke-width="2"/>

<!-- subtitle -->
<text x="80" y="180" fill="#ffb454" font-family="JetBrains Mono, monospace" font-size="22" letter-spacing="2">
  GOALS · WISHLIST · LIFE MISSIONS
</text>

<!-- title -->
<text x="80" y="280" fill="#b8ffc8" font-family="VT323, monospace" font-size="72" filter="url(#glow)">Mission</text>
<text x="80" y="280" fill="#4eff7c" font-family="VT323, monospace" font-size="72">Mission</text>

<!-- tagline -->
<text x="80" y="340" fill="#5fd7ff" font-family="JetBrains Mono, monospace" font-size="24">
  A working list, not a bucket list.
</text>

<!-- status pills -->
<rect x="80" y="380" width="100" height="32" rx="2" fill="none" stroke="#4eff7c" stroke-width="1.5"/>
<circle cx="100" cy="396" r="4" fill="#4eff7c"/>
<text x="112" y="401" fill="#4eff7c" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1">DONE</text>

<rect x="200" y="380" width="150" height="32" rx="2" fill="none" stroke="#5fd7ff" stroke-width="1.5"/>
<circle cx="220" cy="396" r="4" fill="#5fd7ff"/>
<text x="232" y="401" fill="#5fd7ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1">IN PROGRESS</text>

<rect x="370" y="380" width="100" height="32" rx="2" fill="none" stroke="#5f7a65" stroke-width="1.5"/>
<circle cx="390" cy="396" r="4" fill="#5f7a65"/>
<text x="402" y="401" fill="#5f7a65" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1">TODO</text>

<rect x="490" y="380" width="120" height="32" rx="2" fill="none" stroke="#ffb454" stroke-width="1.5"/>
<circle cx="510" cy="396" r="4" fill="#ffb454"/>
<text x="522" y="401" fill="#ffb454" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1">PARTIAL</text>

<!-- sample goals as list -->
<text x="80" y="460" fill="#2a8c44" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="1">
  ✓ Write a book  ·  ✓ Skydive  ·  ✓ Scuba dive  ·  ✓ TEDx talk
</text>
<text x="80" y="490" fill="#2a8c44" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="1">
  → Win 20 hackathons  ·  → 50+ treks  ·  ○ Antarctica  ·  ○ PhD
</text>

<!-- footer -->
<line x1="80" y1="540" x2="1120" y2="540" stroke="#16291c" stroke-width="2"/>
<text x="80" y="575" fill="#5fd7ff" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="2">
  intrepidkarthi.com
</text>
<text x="1120" y="575" fill="#5f7a65" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2" text-anchor="end">
  Engineer · Author · Speaker · Trader
</text>

<!-- corner brackets -->
<path d="M 40 40 L 40 80 M 40 40 L 80 40" stroke="#4eff7c" stroke-width="3" fill="none"/>
<path d="M 1160 40 L 1160 80 M 1160 40 L 1120 40" stroke="#4eff7c" stroke-width="3" fill="none"/>
<path d="M 40 590 L 40 550 M 40 590 L 80 590" stroke="#4eff7c" stroke-width="3" fill="none"/>
<path d="M 1160 590 L 1160 550 M 1160 590 L 1120 590" stroke="#4eff7c" stroke-width="3" fill="none"/>
</svg>