    <line class="g" x1="170" y1="40" x2="170" y2="95"/>
    <rect class="fg" x="166" y="48" width="8" height="20"/>
    <!-- signal trend line -->
    <path class="a" d="M 25 145 Q 60 110 100 95 Q 140 75 180 60" stroke-dasharray="3 3" stroke-width="2"/>
    <!-- signal arrow -->
    <path class="a fa" d="M 180 60 L 172 65 L 175 56 Z"/>
    <text class="mono-a" x="100" y="22">▲ feaws.xyz</text>
    <text class="mono" x="22" y="180">70% / 30 trades</text>
    
</svg>