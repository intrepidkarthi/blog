<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Retire before 45">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .big { font-family: 'JetBrains Mono', monospace; font-size: 42px; fill: #ffb454; stroke: none; font-weight: bold; }
  </style>

  <!-- hammock between two palm trees -->
  <!-- left palm trunk -->
  <path class="d" d="M 35 170 Q 38 130 30 80"/>
  <!-- left palm fronds -->
  <path class="g" d="M 30 80 Q 15 65 8 70" style="opacity:0.6;"/>
  <path class="g" d="M 30 80 Q 20 72 12 80" style="opacity:0.6;"/>
  <path class="g" d="M 30 80 Q 35 65 42 68" style="opacity:0.6;"/>

  <!-- right palm trunk -->
  <path class="d" d="M 165 170 Q 162 130 170 80"/>
  <!-- right palm fronds -->
  <path class="g" d="M 170 80 Q 185 65 192 70" style="opacity:0.6;"/>
  <path class="g" d="M 170 80 Q 180 72 188 80" style="opacity:0.6;"/>
  <path class="g" d="M 170 80 Q 165 65 158 68" style="opacity:0.6;"/>

  <!-- hammock -->
  <path class="c" d="M 38 120 Q 100 155 162 120" style="fill:rgba(95,215,255,0.06);"/>
  <line class="c" x1="38" y1="120" x2="30" y2="105"/>
  <line class="c" x1="162" y1="120" x2="170" y2="105"/>
  <!-- hammock mesh lines -->
  <path class="d" d="M 55 128 Q 100 148 145 128" style="opacity:0.3;"/>
  <path class="d" d="M 65 133 Q 100 150 135 133" style="opacity:0.3;"/>

  <!-- person in hammock -->
  <circle class="a" cx="95" cy="132" r="5"/>
  <line class="a" x1="100" y1="134" x2="115" y2="140"/>

  <!-- < 45 text -->
  <text class="big" x="55" y="55">&lt; 45</text>

  <!-- sun -->
  <circle class="a" cx="170" cy="35" r="10" style="fill:rgba(255,180,84,0.1);"/>
  <line class="a" x1="170" y1="20" x2="170" y2="15" style="opacity:0.4;"/>
  <line class="a" x1="185" y1="35" x2="190" y2="35" style="opacity:0.4;"/>
  <line class="a" x1="181" y1="24" x2="185" y2="20" style="opacity:0.4;"/>
  <line class="a" x1="181" y1="46" x2="185" y2="50" style="opacity:0.4;"/>

  <!-- ground -->
  <line class="d" x1="10" y1="170" x2="190" y2="170"/>

  <text class="mono" x="50" y="192">// freedom clock</text>
</svg>