<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Build a windmill">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
  </style>

  <!-- ground -->
  <line class="d" x1="10" y1="175" x2="190" y2="175"/>
  <!-- tower body (tapered) -->
  <path class="g" d="M 88 175 L 92 75 L 108 75 L 112 175 Z"/>
  <!-- horizontal bands -->
  <line class="d" x1="89" y1="100" x2="111" y2="100"/>
  <line class="d" x1="89" y1="125" x2="112" y2="125"/>
  <line class="d" x1="90" y1="150" x2="112" y2="150"/>
  <!-- hub -->
  <circle class="a" cx="100" cy="72" r="5"/>
  <circle class="fill-a" cx="100" cy="72" r="2" style="fill-opacity:0.6;"/>
  <!-- blades -->
  <path class="c" d="M 100 72 L 85 30 L 100 40 Z" style="fill:rgba(95,215,255,0.1);"/>
  <path class="c" d="M 100 72 L 140 58 L 130 72 Z" style="fill:rgba(95,215,255,0.1);"/>
  <path class="c" d="M 100 72 L 115 114 L 100 104 Z" style="fill:rgba(95,215,255,0.1);"/>
  <path class="c" d="M 100 72 L 60 86 L 70 72 Z" style="fill:rgba(95,215,255,0.1);"/>
  <!-- wind lines -->
  <line class="d" x1="30" y1="45" x2="55" y2="45"/>
  <line class="d" x1="25" y1="55" x2="48" y2="55"/>
  <line class="d" x1="32" y1="65" x2="50" y2="65"/>
  <!-- door -->
  <rect class="a" x="95" y="160" width="10" height="15"/>
  <text class="mono" x="48" y="193">// harness wind</text>
</svg>