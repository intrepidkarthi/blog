<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Local LLM">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- chip body -->
    <rect class="g fill-g" x="55" y="55" width="90" height="90" style="fill-opacity:0.05;"/>
    <rect class="g" x="55" y="55" width="90" height="90"/>
    <!-- pins (top) -->
    <line class="d" x1="65" y1="55" x2="65" y2="42"/>
    <line class="d" x1="80" y1="55" x2="80" y2="42"/>
    <line class="d" x1="95" y1="55" x2="95" y2="42"/>
    <line class="d" x1="110" y1="55" x2="110" y2="42"/>
    <line class="d" x1="125" y1="55" x2="125" y2="42"/>
    <line class="d" x1="135" y1="55" x2="135" y2="42"/>
    <!-- pins (bottom) -->
    <line class="d" x1="65" y1="145" x2="65" y2="158"/>
    <line class="d" x1="80" y1="145" x2="80" y2="158"/>
    <line class="d" x1="95" y1="145" x2="95" y2="158"/>
    <line class="d" x1="110" y1="145" x2="110" y2="158"/>
    <line class="d" x1="125" y1="145" x2="125" y2="158"/>
    <line class="d" x1="135" y1="145" x2="135" y2="158"/>
    <!-- pins (left) -->
    <line class="d" x1="55" y1="70" x2="42" y2="70"/>
    <line class="d" x1="55" y1="85" x2="42" y2="85"/>
    <line class="d" x1="55" y1="100" x2="42" y2="100"/>
    <line class="d" x1="55" y1="115" x2="42" y2="115"/>
    <line class="d" x1="55" y1="130" x2="42" y2="130"/>
    <!-- pins (right) -->
    <line class="d" x1="145" y1="70" x2="158" y2="70"/>
    <line class="d" x1="145" y1="85" x2="158" y2="85"/>
    <line class="d" x1="145" y1="100" x2="158" y2="100"/>
    <line class="d" x1="145" y1="115" x2="158" y2="115"/>
    <line class="d" x1="145" y1="130" x2="158" y2="130"/>
    <!-- neural net inside -->
    <circle class="a fill-a" cx="75" cy="80" r="3"/>
    <circle class="a fill-a" cx="100" cy="75" r="3"/>
    <circle class="a fill-a" cx="125" cy="80" r="3"/>
    <circle class="g fill-g" cx="80" cy="105" r="3"/>
    <circle class="g fill-g" cx="120" cy="105" r="3"/>
    <circle class="p fill-p" cx="100" cy="130" r="3"/>
    <line class="d" x1="75" y1="80" x2="80" y2="105"/>
    <line class="d" x1="75" y1="80" x2="120" y2="105"/>
    <line class="d" x1="100" y1="75" x2="80" y2="105"/>
    <line class="d" x1="100" y1="75" x2="120" y2="105"/>
    <line class="d" x1="125" y1="80" x2="80" y2="105"/>
    <line class="d" x1="125" y1="80" x2="120" y2="105"/>
    <line class="d" x1="80" y1="105" x2="100" y2="130"/>
    <line class="d" x1="120" y1="105" x2="100" y2="130"/>
    <text class="mono" x="62" y="180">LLM @ home</text>
    
</svg>