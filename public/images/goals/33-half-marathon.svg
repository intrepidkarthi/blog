<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Run a half marathon">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .big { font-family: 'JetBrains Mono', monospace; font-size: 28px; fill: #5fd7ff; stroke: none; font-weight: bold; }
  </style>

  <!-- road -->
  <path class="d" d="M 10 150 Q 60 140 100 145 Q 140 150 190 142"/>
  <path class="d" d="M 10 158 Q 60 148 100 153 Q 140 158 190 150"/>
  <!-- road dashes -->
  <line class="a" x1="30" y1="153" x2="45" y2="151" style="stroke-dasharray:4 6;opacity:0.4;"/>
  <line class="a" x1="70" y1="151" x2="85" y2="152" style="stroke-dasharray:4 6;opacity:0.4;"/>
  <line class="a" x1="110" y1="153" x2="125" y2="152" style="stroke-dasharray:4 6;opacity:0.4;"/>
  <line class="a" x1="150" y1="150" x2="165" y2="148" style="stroke-dasharray:4 6;opacity:0.4;"/>

  <!-- runner - head -->
  <circle class="g" cx="105" cy="105" r="6"/>
  <!-- runner - body leaning forward -->
  <line class="g" x1="105" y1="111" x2="100" y2="132"/>
  <!-- runner - arms pumping -->
  <line class="g" x1="102" y1="118" x2="90" y2="112"/>
  <line class="g" x1="102" y1="118" x2="112" y2="124"/>
  <!-- runner - legs in stride -->
  <line class="g" x1="100" y1="132" x2="88" y2="145"/>
  <line class="g" x1="100" y1="132" x2="112" y2="148"/>
  <!-- back foot kick -->
  <line class="g" x1="88" y1="145" x2="85" y2="142"/>

  <!-- bib number -->
  <rect class="a" x="96" y="119" width="10" height="7" style="fill:rgba(255,180,84,0.15);"/>

  <!-- motion lines -->
  <line class="d" x1="75" y1="108" x2="65" y2="108"/>
  <line class="d" x1="78" y1="115" x2="66" y2="115"/>
  <line class="d" x1="76" y1="122" x2="68" y2="122"/>

  <!-- finish banner -->
  <line class="p" x1="150" y1="90" x2="150" y2="150"/>
  <line class="p" x1="170" y1="90" x2="170" y2="150"/>
  <rect class="p" x="150" y="95" width="20" height="12" style="fill:rgba(255,95,135,0.15);"/>
  <!-- checkered pattern on banner -->
  <line class="p" x1="155" y1="95" x2="155" y2="107" style="opacity:0.4;"/>
  <line class="p" x1="160" y1="95" x2="160" y2="107" style="opacity:0.4;"/>
  <line class="p" x1="165" y1="95" x2="165" y2="107" style="opacity:0.4;"/>
  <line class="p" x1="150" y1="101" x2="170" y2="101" style="opacity:0.4;"/>

  <!-- 21.1K text -->
  <text class="big" x="45" y="50">21.1K</text>

  <!-- sunrise hint -->
  <path class="a" d="M 25 75 Q 50 60 75 75" style="opacity:0.3;fill:rgba(255,180,84,0.06);"/>

  <text class="mono" x="40" y="190">// cross the line</text>
</svg>