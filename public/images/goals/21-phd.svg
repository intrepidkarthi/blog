<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="PhD">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- cap top (mortarboard) -->
    <path class="g fill-g" d="M 30 80 L 100 55 L 170 80 L 100 105 Z" style="fill-opacity:0.05;"/>
    <path class="g" d="M 30 80 L 100 55 L 170 80 L 100 105 Z"/>
    <!-- cap base -->
    <path class="g" d="M 65 96 L 65 130 Q 100 145 135 130 L 135 96"/>
    <!-- button on top -->
    <circle class="a fill-a" cx="100" cy="80" r="3"/>
    <!-- tassel cord -->
    <path class="a" d="M 100 80 Q 130 90 140 110"/>
    <!-- tassel strands -->
    <line class="a" x1="140" y1="110" x2="138" y2="135"/>
    <line class="a" x1="142" y1="110" x2="143" y2="135"/>
    <line class="a" x1="138" y1="110" x2="135" y2="133"/>
    <line class="a" x1="144" y1="110" x2="148" y2="133"/>
    <!-- diploma scroll -->
    <rect class="d" x="55" y="155" width="90" height="14" rx="2"/>
    <line class="d" x1="55" y1="159" x2="145" y2="159"/>
    <line class="d" x1="55" y1="166" x2="145" y2="166"/>
    <text class="mono-a" x="55" y="190">// future Dr.</text>
    
</svg>