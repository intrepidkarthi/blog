<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Northern Lights">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- stars -->
    <circle class="dot-a" cx="30" cy="20" r="1.5"/>
    <circle class="dot-g" cx="160" cy="15" r="1.2"/>
    <circle class="dot-a" cx="180" cy="35" r="1.5"/>
    <!-- aurora bands - flowing wavy lines -->
    <path class="g" d="M 10 70 Q 50 40 100 70 Q 150 100 190 60" stroke-width="3"/>
    <path class="a" d="M 10 90 Q 50 65 100 95 Q 150 125 190 80" stroke-width="3"/>
    <path class="c" d="M 10 110 Q 50 90 100 120 Q 150 145 190 100" stroke-width="3"/>
    <path class="p" d="M 10 130 Q 50 115 100 140 Q 150 160 190 120" stroke-width="2"/>
    <!-- horizon -->
    <line class="d" x1="0" y1="170" x2="200" y2="170"/>
    <!-- mountain silhouette -->
    <path class="d" d="M 0 170 L 30 150 L 60 165 L 90 145 L 130 160 L 160 148 L 200 168 L 200 170 Z"/>
    <text class="mono-a" x="55" y="190">// aurora</text>
    
</svg>