<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Give a TEDx talk">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-p { font-family: 'JetBrains Mono', monospace; font-size: 22px; fill: #ff5f87; stroke: none; font-weight: bold; }
  </style>

  <!-- stage floor -->
  <path class="p" d="M 20 145 L 50 160 L 150 160 L 180 145" style="fill:rgba(255,95,135,0.06);"/>
  <line class="p" x1="50" y1="160" x2="150" y2="160"/>
  <!-- red circle carpet -->
  <ellipse class="p" cx="100" cy="135" rx="35" ry="8" style="fill:rgba(255,95,135,0.12);"/>
  <!-- person - head -->
  <circle class="g" cx="100" cy="90" r="8"/>
  <!-- person - body -->
  <line class="g" x1="100" y1="98" x2="100" y2="125"/>
  <!-- person - arms (presenting gesture) -->
  <line class="g" x1="100" y1="108" x2="80" y2="100"/>
  <line class="g" x1="100" y1="108" x2="120" y2="100"/>
  <!-- person - legs -->
  <line class="g" x1="100" y1="125" x2="92" y2="142"/>
  <line class="g" x1="100" y1="125" x2="108" y2="142"/>
  <!-- spotlight beams -->
  <line class="a" x1="40" y1="30" x2="85" y2="85" style="opacity:0.4;"/>
  <line class="a" x1="160" y1="30" x2="115" y2="85" style="opacity:0.4;"/>
  <!-- TEDx text -->
  <text class="mono-p" x="62" y="50">TEDx</text>
  <!-- audience dots -->
  <circle class="d" cx="45" cy="175" r="3"/>
  <circle class="d" cx="60" cy="178" r="3"/>
  <circle class="d" cx="75" cy="175" r="3"/>
  <circle class="d" cx="90" cy="178" r="3"/>
  <circle class="d" cx="110" cy="178" r="3"/>
  <circle class="d" cx="125" cy="175" r="3"/>
  <circle class="d" cx="140" cy="178" r="3"/>
  <circle class="d" cx="155" cy="175" r="3"/>
  <text class="mono" x="45" y="195">// share ideas</text>
</svg>