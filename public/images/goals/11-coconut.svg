<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Coconut tree">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- trunk (curved) -->
    <path class="g" d="M 95 175 Q 105 130 88 90 Q 80 75 95 60"/>
    <!-- trunk segments -->
    <line class="d" x1="92" y1="160" x2="100" y2="160"/>
    <line class="d" x1="93" y1="140" x2="101" y2="140"/>
    <line class="d" x1="91" y1="120" x2="99" y2="120"/>
    <line class="d" x1="89" y1="100" x2="97" y2="100"/>
    <!-- fronds -->
    <path class="g" d="M 95 60 Q 60 40 30 50"/>
    <path class="g" d="M 95 60 Q 75 35 50 25"/>
    <path class="g" d="M 95 60 Q 95 30 100 15"/>
    <path class="g" d="M 95 60 Q 130 35 145 25"/>
    <path class="g" d="M 95 60 Q 140 50 170 60"/>
    <path class="g" d="M 95 60 Q 130 50 155 80"/>
    <path class="g" d="M 95 60 Q 65 50 50 80"/>
    <!-- coconuts -->
    <circle class="a fill-a" cx="80" cy="62" r="4"/>
    <circle class="a fill-a" cx="105" cy="58" r="4"/>
    <circle class="a fill-a" cx="92" cy="68" r="4"/>
    <text class="mono" x="55" y="195">// roots</text>
    
</svg>