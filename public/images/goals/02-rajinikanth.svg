<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Meeting Rajinikanth">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- head silhouette -->
    <ellipse class="g fill-g" cx="100" cy="90" rx="40" ry="50" style="fill-opacity:0.05;"/>
    <ellipse class="g" cx="100" cy="90" rx="40" ry="50"/>
    <!-- iconic sunglasses (Rajini) -->
    <rect class="a" x="65" y="78" width="28" height="14" rx="3"/>
    <rect class="a" x="107" y="78" width="28" height="14" rx="3"/>
    <line class="a" x1="93" y1="85" x2="107" y2="85"/>
    <!-- mustache hint -->
    <path class="g" d="M 88 110 Q 100 116 112 110"/>
    <!-- shoulders -->
    <path class="g" d="M 50 175 Q 70 145 100 145 Q 130 145 150 175"/>
    <!-- collar -->
    <path class="d" d="M 88 145 L 100 158 L 112 145"/>
    <text class="mono-a" x="55" y="195">// thalaivar</text>
    
</svg>