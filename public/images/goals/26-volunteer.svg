<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Volunteer for a bigger cause">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
  </style>

  <!-- two hands cradling -->
  <path class="g" d="M 30 130 Q 25 95 50 90 Q 60 90 65 100 L 80 130"/>
  <path class="g" d="M 170 130 Q 175 95 150 90 Q 140 90 135 100 L 120 130"/>
  <!-- palms -->
  <path class="g fill-g" d="M 30 130 Q 50 145 100 145 Q 150 145 170 130 L 170 150 Q 150 160 100 160 Q 50 160 30 150 Z"
        style="fill-opacity:0.10;"/>

  <!-- heart in center -->
  <path class="p fill-p"
        d="M 100 80 Q 92 70 82 72 Q 70 75 72 88 Q 75 102 100 120 Q 125 102 128 88 Q 130 75 118 72 Q 108 70 100 80 Z"
        style="fill-opacity:0.20;"/>
  <path class="p"
        d="M 100 80 Q 92 70 82 72 Q 70 75 72 88 Q 75 102 100 120 Q 125 102 128 88 Q 130 75 118 72 Q 108 70 100 80 Z"/>

  <!-- small figures (community) -->
  <circle class="a" cx="40" cy="40" r="4"/>
  <line class="a" x1="40" y1="44" x2="40" y2="55"/>
  <line class="a" x1="40" y1="48" x2="34" y2="54"/>
  <line class="a" x1="40" y1="48" x2="46" y2="54"/>

  <circle class="a" cx="100" cy="35" r="4"/>
  <line class="a" x1="100" y1="39" x2="100" y2="50"/>
  <line class="a" x1="100" y1="43" x2="94"  y2="49"/>
  <line class="a" x1="100" y1="43" x2="106" y2="49"/>

  <circle class="a" cx="160" cy="40" r="4"/>
  <line class="a" x1="160" y1="44" x2="160" y2="55"/>
  <line class="a" x1="160" y1="48" x2="154" y2="54"/>
  <line class="a" x1="160" y1="48" x2="166" y2="54"/>

  <!-- connecting dotted line -->
  <path class="d" d="M 44 42 Q 70 30 96 38 M 104 38 Q 130 30 156 42" style="stroke-dasharray: 3 4;"/>

  <text class="mono-a" x="50" y="190">CAUSE · TODO</text>
</svg>
