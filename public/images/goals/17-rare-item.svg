<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Rare unique item">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- diamond top -->
    <path class="g" d="M 65 75 L 100 50 L 135 75 L 100 90 Z"/>
    <!-- diamond bottom -->
    <path class="g" d="M 65 75 L 100 145 L 135 75"/>
    <!-- facet lines -->
    <line class="g" x1="100" y1="50" x2="100" y2="90"/>
    <line class="g" x1="80" y1="62" x2="100" y2="90"/>
    <line class="g" x1="120" y1="62" x2="100" y2="90"/>
    <line class="d" x1="65" y1="75" x2="135" y2="75"/>
    <line class="d" x1="100" y1="90" x2="65" y2="75"/>
    <line class="d" x1="100" y1="90" x2="135" y2="75"/>
    <!-- shine sparks -->
    <line class="a" x1="155" y1="55" x2="170" y2="40" stroke-width="2"/>
    <line class="a" x1="160" y1="48" x2="178" y2="48" stroke-width="2"/>
    <line class="a" x1="35" y1="95" x2="22" y2="105" stroke-width="2"/>
    <line class="a" x1="160" y1="100" x2="180" y2="105" stroke-width="2"/>
    <text class="mono-a" x="55" y="180">// one of one</text>
    
</svg>