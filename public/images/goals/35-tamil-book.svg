<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Write a Tamil book">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
  </style>

  <!-- book spine shadow -->
  <path class="d" d="M 55 45 L 55 160 L 60 165 L 60 50 Z" style="fill:rgba(78,255,124,0.04);"/>
  <!-- book cover -->
  <rect class="g" x="60" y="45" width="85" height="120" style="fill:rgba(78,255,124,0.03);"/>
  <!-- book spine -->
  <line class="g" x1="60" y1="45" x2="60" y2="165"/>
  <!-- cover border detail -->
  <rect class="a" x="68" y="53" width="69" height="104" style="stroke-dasharray:3 3;opacity:0.4;"/>

  <!-- Tamil letter தமிழ் stylized -->
  <text x="78" y="100" style="font-size:32px;fill:#ff5f87;stroke:none;font-family:serif;">தமிழ்</text>

  <!-- decorative lines (like book text) -->
  <line class="d" x1="74" y1="118" x2="130" y2="118"/>
  <line class="d" x1="74" y1="126" x2="120" y2="126"/>
  <line class="d" x1="74" y1="134" x2="126" y2="134"/>
  <line class="d" x1="74" y1="142" x2="112" y2="142"/>

  <!-- pen -->
  <line class="a" x1="150" y1="75" x2="165" y2="55"/>
  <path class="a" d="M 150 75 L 148 80 L 153 78 Z" style="fill:rgba(255,180,84,0.3);"/>
  <!-- ink drops -->
  <circle class="p" cx="155" cy="85" r="1.5" style="fill:#ff5f87;opacity:0.5;"/>
  <circle class="p" cx="160" cy="90" r="1" style="fill:#ff5f87;opacity:0.4;"/>

  <!-- pages edge -->
  <line class="d" x1="145" y1="48" x2="145" y2="162" style="opacity:0.3;"/>
  <line class="d" x1="143" y1="47" x2="143" y2="161" style="opacity:0.2;"/>

  <text class="mono" x="42" y="190">// mother tongue</text>
</svg>