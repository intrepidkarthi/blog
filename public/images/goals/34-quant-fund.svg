<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Launch a fund">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
  </style>

  <!-- chart area background -->
  <rect class="d" x="30" y="40" width="140" height="90" style="fill:rgba(78,255,124,0.03);"/>
  <!-- grid lines -->
  <line class="d" x1="30" y1="65" x2="170" y2="65" style="opacity:0.4;"/>
  <line class="d" x1="30" y1="90" x2="170" y2="90" style="opacity:0.4;"/>
  <line class="d" x1="30" y1="115" x2="170" y2="115" style="opacity:0.4;"/>
  <!-- axes -->
  <line class="d" x1="30" y1="40" x2="30" y2="130"/>
  <line class="d" x1="30" y1="130" x2="170" y2="130"/>
  <!-- equity curve (upward trending) -->
  <polyline class="g" points="35,120 50,115 65,108 80,100 90,105 100,90 110,85 120,75 130,80 140,65 150,55 160,48 168,45" style="fill:none;stroke-width:2.5;"/>
  <!-- area fill under curve -->
  <path class="g" d="M 35 120 L 50 115 L 65 108 L 80 100 L 90 105 L 100 90 L 110 85 L 120 75 L 130 80 L 140 65 L 150 55 L 160 48 L 168 45 L 168 130 L 35 130 Z" style="fill:rgba(78,255,124,0.06);stroke:none;"/>

  <!-- dollar signs (capital) -->
  <text x="145" y="58" style="font-family:'JetBrains Mono',monospace;font-size:14px;fill:#ffb454;stroke:none;font-weight:bold;">$</text>
  <text x="155" y="50" style="font-family:'JetBrains Mono',monospace;font-size:10px;fill:#ffb454;stroke:none;">$</text>

  <!-- fund vault / building -->
  <rect class="a" x="70" y="145" width="60" height="35"/>
  <line class="a" x1="65" y1="145" x2="135" y2="145"/>
  <!-- columns -->
  <line class="a" x1="82" y1="145" x2="82" y2="180"/>
  <line class="a" x1="100" y1="145" x2="100" y2="180"/>
  <line class="a" x1="118" y1="145" x2="118" y2="180"/>
  <!-- pediment -->
  <path class="a" d="M 65 145 L 100 132 L 135 145"/>
  <!-- keystone -->
  <circle class="c" cx="100" cy="155" r="6"/>
  <text x="96" y="159" style="font-family:'JetBrains Mono',monospace;font-size:10px;fill:#5fd7ff;stroke:none;font-weight:bold;">₿</text>

  <text class="mono" x="38" y="198">// manage capital</text>
</svg>