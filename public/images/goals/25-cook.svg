<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Cook for a large audience">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
  </style>

  <!-- chef hat -->
  <path class="g fill-g" d="M 75 35 Q 60 35 60 50 Q 50 50 50 65 Q 50 80 60 82 L 140 82 Q 150 80 150 65 Q 150 50 140 50 Q 140 35 125 35 Q 115 25 100 30 Q 85 25 75 35 Z"
        style="fill-opacity:0.10;"/>
  <line class="d" x1="60" y1="82" x2="140" y2="82"/>

  <!-- pot/wok -->
  <path class="a fill-a" d="M 50 130 L 150 130 L 140 170 L 60 170 Z" style="fill-opacity:0.18;"/>
  <path class="a" d="M 50 130 L 150 130 L 140 170 L 60 170 Z"/>
  <!-- pot rim -->
  <line class="a" x1="48" y1="130" x2="152" y2="130"/>
  <!-- handles -->
  <path class="a" d="M 50 132 L 38 138"/>
  <path class="a" d="M 150 132 L 162 138"/>

  <!-- steam -->
  <path class="c" d="M 75 125 Q 70 115 78 105 Q 86 95 80 88"/>
  <path class="c" d="M 100 125 Q 95 115 103 105 Q 111 95 105 88"/>
  <path class="c" d="M 125 125 Q 120 115 128 105 Q 136 95 130 88"/>

  <!-- ladle -->
  <path class="p" d="M 158 95 L 175 80"/>
  <ellipse class="p fill-p" cx="155" cy="98" rx="6" ry="4" style="fill-opacity:0.30;"/>

  <!-- audience plates (tiny dots row) -->
  <circle class="dot-g g fill-g" cx="35"  cy="185" r="3"/>
  <circle class="dot-g g fill-g" cx="55"  cy="185" r="3"/>
  <circle class="dot-g g fill-g" cx="75"  cy="185" r="3"/>
  <circle class="dot-g g fill-g" cx="125" cy="185" r="3"/>
  <circle class="dot-g g fill-g" cx="145" cy="185" r="3"/>
  <circle class="dot-g g fill-g" cx="165" cy="185" r="3"/>
  <text class="mono-a" x="83" y="190" style="font-size:10px;">50+</text>
</svg>
