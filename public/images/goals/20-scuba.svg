<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Scuba diving">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- bubbles ascending -->
    <circle class="c" cx="55" cy="35" r="6"/>
    <circle class="c" cx="65" cy="55" r="4"/>
    <circle class="c" cx="50" cy="70" r="3"/>
    <circle class="c" cx="60" cy="85" r="5"/>
    <circle class="c" cx="48" cy="100" r="3"/>
    <!-- mask -->
    <rect class="a" x="80" y="80" width="80" height="50" rx="8"/>
    <line class="a" x1="120" y1="80" x2="120" y2="130"/>
    <!-- mask glass detail -->
    <ellipse class="g" cx="100" cy="105" rx="13" ry="13"/>
    <ellipse class="g" cx="140" cy="105" rx="13" ry="13"/>
    <!-- mask strap -->
    <line class="d" x1="80" y1="105" x2="65" y2="105"/>
    <line class="d" x1="160" y1="105" x2="175" y2="105"/>
    <!-- regulator hose hint -->
    <path class="g" d="M 120 130 Q 115 145 105 155 L 100 175"/>
    <text class="mono" x="55" y="195">depth: deeper ✓</text>
    
</svg>