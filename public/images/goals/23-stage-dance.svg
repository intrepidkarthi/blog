<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Dance on stage">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .fill-c { fill: #5fd7ff; stroke: #5fd7ff; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
  </style>

  <!-- spotlight cone (left) -->
  <path class="a" d="M 25 20 L 95 130 L 75 130 Z" style="fill: rgba(255,180,84,0.10);"/>
  <!-- spotlight cone (right) -->
  <path class="a" d="M 175 20 L 105 130 L 125 130 Z" style="fill: rgba(255,180,84,0.10);"/>

  <!-- stage platform -->
  <rect class="g" x="20" y="135" width="160" height="14"/>
  <line class="d" x1="20" y1="142" x2="180" y2="142"/>
  <line class="d" x1="40" y1="135" x2="35"  y2="149"/>
  <line class="d" x1="80" y1="135" x2="78"  y2="149"/>
  <line class="d" x1="120" y1="135" x2="122" y2="149"/>
  <line class="d" x1="160" y1="135" x2="165" y2="149"/>

  <!-- dancer figure -->
  <circle class="g" cx="100" cy="62" r="8"/>
  <!-- torso curving -->
  <path class="g" d="M 100 70 Q 95 90 102 110 Q 110 125 100 135"/>
  <!-- arms raised -->
  <path class="g" d="M 100 80 Q 80 70 70 50"/>
  <path class="g" d="M 102 80 Q 122 75 135 60"/>
  <!-- legs in motion -->
  <line class="g" x1="100" y1="135" x2="85"  y2="160"/>
  <line class="g" x1="100" y1="135" x2="118" y2="135"/>
  <line class="g" x1="118" y1="135" x2="125" y2="160"/>

  <!-- audience silhouette -->
  <circle class="dot-p p" cx="35" cy="180" r="4" style="fill:#ff5f87;"/>
  <circle class="dot-p p" cx="55" cy="180" r="4" style="fill:#ff5f87;"/>
  <circle class="dot-p p" cx="75" cy="180" r="4" style="fill:#ff5f87;"/>
  <circle class="dot-p p" cx="125" cy="180" r="4" style="fill:#ff5f87;"/>
  <circle class="dot-p p" cx="145" cy="180" r="4" style="fill:#ff5f87;"/>
  <circle class="dot-p p" cx="165" cy="180" r="4" style="fill:#ff5f87;"/>

  <!-- music notes -->
  <text class="mono-a" x="155" y="40" style="font-size:14px;">♪</text>
  <text class="mono-a" x="35"  y="55" style="font-size:14px;">♫</text>

  <text class="mono-a" x="55" y="195">STAGE · ×2</text>
</svg>
