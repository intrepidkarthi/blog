<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="1 Million downloads">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- axis -->
    <line class="d" x1="30" y1="160" x2="180" y2="160"/>
    <line class="d" x1="30" y1="40" x2="30" y2="160"/>
    <!-- bars -->
    <rect class="g" x="42" y="135" width="14" height="25"/>
    <rect class="g" x="62" y="115" width="14" height="45"/>
    <rect class="g" x="82" y="92" width="14" height="68"/>
    <rect class="g" x="102" y="74" width="14" height="86"/>
    <rect class="a" x="122" y="58" width="14" height="102"/>
    <rect class="a" x="142" y="42" width="14" height="118"/>
    <!-- target line -->
    <line class="p" x1="30" y1="50" x2="180" y2="50" stroke-dasharray="4 3"/>
    <text class="mono-a" x="138" y="36">1M ★</text>
    <text class="mono" x="40" y="180">downloads</text>
    
</svg>