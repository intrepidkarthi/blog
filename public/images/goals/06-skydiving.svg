<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Skydiving">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- parachute canopy -->
    <path class="a" d="M 40 80 Q 100 30 160 80"/>
    <!-- canopy panels -->
    <line class="d" x1="60" y1="65" x2="60" y2="80"/>
    <line class="d" x1="80" y1="55" x2="80" y2="80"/>
    <line class="d" x1="100" y1="50" x2="100" y2="80"/>
    <line class="d" x1="120" y1="55" x2="120" y2="80"/>
    <line class="d" x1="140" y1="65" x2="140" y2="80"/>
    <!-- cords -->
    <line class="g" x1="40" y1="80" x2="92" y2="125"/>
    <line class="g" x1="80" y1="80" x2="95" y2="125"/>
    <line class="g" x1="120" y1="80" x2="105" y2="125"/>
    <line class="g" x1="160" y1="80" x2="108" y2="125"/>
    <!-- harness/figure -->
    <circle class="g" cx="100" cy="135" r="9"/>
    <line class="g" x1="100" y1="144" x2="100" y2="170"/>
    <line class="g" x1="100" y1="155" x2="92" y2="148"/>
    <line class="g" x1="100" y1="155" x2="108" y2="148"/>
    <text class="mono-a" x="55" y="195">DXB · 2022</text>
    
</svg>