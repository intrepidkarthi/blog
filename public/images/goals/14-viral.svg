<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Going viral">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>
  
    <!-- axis -->
    <line class="d" x1="25" y1="160" x2="180" y2="160"/>
    <line class="d" x1="25" y1="30" x2="25" y2="160"/>
    <!-- viral curve (J-shape spike) -->
    <path class="g" d="M 25 155 L 50 150 L 75 145 L 100 135 L 120 110 L 140 70 L 165 35"/>
    <!-- arrow tip -->
    <path class="a fill-a" d="M 165 35 L 158 42 L 152 32 Z"/>
    <!-- virus dots / spread -->
    <circle class="dot-p" cx="155" cy="45" r="3" style="fill:#ff5f87;"/>
    <circle class="dot-a" cx="170" cy="55" r="2.5"/>
    <circle class="dot-g" cx="175" cy="40" r="2"/>
    <circle class="dot-a" cx="148" cy="60" r="2"/>
    <circle class="dot-g" cx="160" cy="65" r="1.8"/>
    <!-- baseline label -->
    <text class="mono" x="35" y="175">launch</text>
    <text class="mono-a" x="135" y="25">▲ HN front page</text>
    
</svg>