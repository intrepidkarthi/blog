<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Build a large library at home">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
    .dot-g { fill: #4eff7c; stroke: none; }
    .dot-a { fill: #ffb454; stroke: none; }
    .dim-fill { fill: rgba(78,255,124,0.08); stroke: #4eff7c; }
  </style>

    <!-- bookshelf frame -->
    <rect class="g" x="30" y="40" width="140" height="130" rx="2"/>
    <!-- shelf dividers -->
    <line class="d" x1="30" y1="82" x2="170" y2="82"/>
    <line class="d" x1="30" y1="124" x2="170" y2="124"/>

    <!-- top shelf books (vertical spines) -->
    <rect class="a" x="38" y="46" width="10" height="32" rx="1"/>
    <rect class="g" x="52" y="48" width="8" height="30" rx="1"/>
    <rect class="c" x="64" y="44" width="12" height="34" rx="1"/>
    <rect class="p" x="80" y="47" width="9" height="31" rx="1"/>
    <rect class="g" x="93" y="45" width="11" height="33" rx="1"/>
    <rect class="a" x="108" y="48" width="8" height="30" rx="1"/>
    <rect class="c" x="120" y="44" width="10" height="34" rx="1"/>
    <rect class="g" x="134" y="46" width="12" height="32" rx="1"/>
    <rect class="p" x="150" y="48" width="9" height="30" rx="1"/>

    <!-- middle shelf books -->
    <rect class="g" x="38" y="87" width="11" height="32" rx="1"/>
    <rect class="p" x="53" y="89" width="9" height="30" rx="1"/>
    <rect class="a" x="66" y="86" width="12" height="34" rx="1"/>
    <rect class="c" x="82" y="88" width="8" height="30" rx="1"/>
    <rect class="g" x="94" y="85" width="10" height="33" rx="1"/>
    <rect class="a" x="108" y="88" width="11" height="30" rx="1"/>
    <rect class="p" x="123" y="86" width="9" height="34" rx="1"/>
    <rect class="c" x="136" y="89" width="12" height="31" rx="1"/>
    <rect class="g" x="152" y="87" width="8" height="33" rx="1"/>

    <!-- bottom shelf books -->
    <rect class="c" x="38" y="128" width="10" height="34" rx="1"/>
    <rect class="g" x="52" y="130" width="12" height="32" rx="1"/>
    <rect class="a" x="68" y="127" width="9" height="35" rx="1"/>
    <rect class="p" x="81" y="130" width="11" height="32" rx="1"/>
    <rect class="g" x="96" y="128" width="8" height="34" rx="1"/>
    <rect class="c" x="108" y="131" width="12" height="31" rx="1"/>
    <rect class="a" x="124" y="128" width="10" height="34" rx="1"/>
    <rect class="g" x="138" y="130" width="9" height="32" rx="1"/>
    <rect class="p" x="151" y="128" width="11" height="34" rx="1"/>

    <text class="mono" x="55" y="188">floor to ceiling</text>

</svg>
