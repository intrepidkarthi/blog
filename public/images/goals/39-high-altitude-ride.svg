<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Ride a bike above 10,000 feet">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #4eff7c; stroke: none; }
    .big { font-family: 'JetBrains Mono', monospace; font-size: 16px; fill: #5fd7ff; stroke: none; font-weight: bold; }
  </style>

  <!-- mountains background -->
  <path class="d" d="M 0 100 L 30 55 L 55 80 L 80 40 L 110 70 L 140 35 L 170 65 L 200 45 L 200 100 Z" style="fill:rgba(78,255,124,0.03);"/>
  <path class="g" d="M 0 100 L 30 55 L 55 80 L 80 40 L 110 70 L 140 35 L 170 65 L 200 45"/>
  <!-- snow caps -->
  <path class="a" d="M 75 48 L 80 40 L 85 48" style="fill:rgba(255,180,84,0.25);stroke:none;"/>
  <path class="a" d="M 135 43 L 140 35 L 145 43" style="fill:rgba(255,180,84,0.25);stroke:none;"/>

  <!-- road winding -->
  <path class="d" d="M 10 160 Q 50 150 70 140 Q 100 125 130 130 Q 160 135 185 120"/>

  <!-- motorcycle -->
  <!-- rear wheel -->
  <circle class="g" cx="105" cy="128" r="10"/>
  <circle class="g" cx="105" cy="128" r="2"/>
  <!-- front wheel -->
  <circle class="g" cx="140" cy="125" r="10"/>
  <circle class="g" cx="140" cy="125" r="2"/>
  <!-- frame -->
  <path class="a" d="M 105 128 L 115 112 L 135 112 L 140 125"/>
  <!-- tank -->
  <path class="a" d="M 115 108 Q 123 103 132 108" style="fill:rgba(255,180,84,0.15);"/>
  <!-- seat -->
  <path class="c" d="M 107 108 Q 113 103 118 108"/>
  <!-- handlebar -->
  <line class="g" x1="135" y1="112" x2="140" y2="102"/>
  <line class="g" x1="136" y1="104" x2="144" y2="102"/>
  <!-- rider head -->
  <circle class="g" cx="118" cy="97" r="5"/>
  <!-- rider body -->
  <line class="g" x1="118" y1="102" x2="118" y2="112"/>
  <!-- rider arms -->
  <line class="g" x1="118" y1="106" x2="136" y2="104"/>

  <!-- altitude text -->
  <text class="big" x="25" y="25">18,380 ft</text>
  <!-- Khardung La label -->
  <text x="30" y="38" style="font-family:'JetBrains Mono',monospace;font-size:9px;fill:#ffb454;stroke:none;letter-spacing:1px;">KHARDUNG LA</text>

  <!-- prayer flags -->
  <line class="p" x1="155" y1="55" x2="185" y2="50"/>
  <rect class="p" x="158" y="50" width="5" height="7" style="fill:rgba(255,95,135,0.2);"/>
  <rect class="a" x="164" y="49" width="5" height="7" style="fill:rgba(255,180,84,0.2);"/>
  <rect class="c" x="170" y="48" width="5" height="7" style="fill:rgba(95,215,255,0.2);"/>
  <rect class="g" x="176" y="47" width="5" height="7" style="fill:rgba(78,255,124,0.2);"/>

  <text class="mono" x="38" y="185">// top of the world</text>
</svg>