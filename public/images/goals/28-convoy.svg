<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Long-haul convoy trip">
  <style>
    .g { stroke: #4eff7c; }
    .a { stroke: #ffb454; }
    .p { stroke: #ff5f87; }
    .c { stroke: #5fd7ff; }
    .d { stroke: #2a8c44; }
    g, path, line, rect, circle, polyline, polygon, ellipse {
      fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .fill-g { fill: #4eff7c; stroke: #4eff7c; }
    .fill-a { fill: #ffb454; stroke: #ffb454; }
    .fill-p { fill: #ff5f87; stroke: #ff5f87; }
    .fill-c { fill: #5fd7ff; stroke: #5fd7ff; }
    .mono-a { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffb454; stroke: none; }
  </style>

  <!-- distant mountains -->
  <path class="d" d="M 10 70 L 50 35 L 80 60 L 120 25 L 160 55 L 195 40 L 195 80 L 10 80 Z"
        style="fill: rgba(78,255,124,0.04);"/>

  <!-- horizon sun -->
  <circle class="a fill-a" cx="170" cy="60" r="10" style="fill-opacity:0.30;"/>
  <circle class="a" cx="170" cy="60" r="10"/>

  <!-- road perspective -->
  <path class="g" d="M 30 175 L 90 95 L 110 95 L 170 175 Z" style="fill: rgba(78,255,124,0.06);"/>
  <line class="d" x1="100" y1="95" x2="100" y2="105" style="stroke-dasharray: 4 4;"/>
  <line class="d" x1="100" y1="115" x2="100" y2="135" style="stroke-dasharray: 5 5;"/>
  <line class="d" x1="100" y1="145" x2="100" y2="170" style="stroke-dasharray: 6 5;"/>

  <!-- car 1 (lead, far) -->
  <rect class="p" x="90" y="100" width="20" height="9"/>
  <rect class="p fill-p" x="92" y="103" width="16" height="3" style="fill-opacity:0.40;"/>
  <circle class="dot-p p fill-p" cx="93"  cy="110" r="1.4"/>
  <circle class="dot-p p fill-p" cx="107" cy="110" r="1.4"/>

  <!-- car 2 (mid) -->
  <rect class="a" x="82" y="125" width="36" height="14"/>
  <rect class="a fill-a" x="86" y="129" width="28" height="5" style="fill-opacity:0.40;"/>
  <circle class="dot-a a fill-a" cx="88"  cy="140" r="2"/>
  <circle class="dot-a a fill-a" cx="112" cy="140" r="2"/>

  <!-- car 3 (front, close) -->
  <rect class="g" x="68" y="155" width="64" height="20"/>
  <rect class="g fill-g" x="74" y="160" width="52" height="8" style="fill-opacity:0.30;"/>
  <circle class="dot-g g fill-g" cx="78"  cy="177" r="3"/>
  <circle class="dot-g g fill-g" cx="122" cy="177" r="3"/>
  <!-- headlights forward -->
  <line class="c" x1="74"  y1="158" x2="68" y2="153"/>
  <line class="c" x1="126" y1="158" x2="132" y2="153"/>

  <text class="mono-a" x="50" y="195">CONVOY · TODO</text>
</svg>
